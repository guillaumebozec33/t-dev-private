name: Release
on:
  workflow_dispatch: # Optionnel : permet aussi de le lancer manuellement depuis l'onglet Actions

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bundles: dmg
            os: self-hosted
            labels: [self-hosted, macos]
          - platform: windows-latest
            bundles: nsis
            os: self-hosted
            labels: [self-hosted, windows]
          - platform: ubuntu-22.04
            bundles: deb
            os: self-hosted
            labels: [self-hosted, linux]

    runs-on: ${{ matrix.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.0'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      - name: Install frontend dependencies
        run: npm install # Ou yarn install / pnpm install
        working-directory: ./tjsf

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        with:
          projectPath: ./tjsf
          tagName: v__VERSION__
          releaseName: "App Release v__VERSION__"
          releaseBody: "Nouveautés de cette version."
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}