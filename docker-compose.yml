services:
  postgres:
    image: postgres:16-alpine
    container_name: rtc_postgres
    env_file: ".env"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/20240101000001_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/migrations/20240102000001_add_bans.sql:/docker-entrypoint-initdb.d/02_add_bans.sql
      - ./backend/migrations/20240102000001_add_is_private_to_channels.sql:/docker-entrypoint-initdb.d/03_add_is_private_to_channels.sql
      - ./backend/migrations/20240104000001_add_direct_messages.sql:/docker-entrypoint-initdb.d/04_add_direct_messages.sql
      - ./backend/migrations/20240105000001_add_reactions.sql:/docker-entrypoint-initdb.d/05_add_reactions.sql
      - ./backend/migrations/20240106000001_add_icon_to_channels.sql:/docker-entrypoint-initdb.d/06_add_icon_to_channels.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtc_user -d rtc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rtc_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: rtc_backend
    ports:
      - "3001:3001"
    env_file: ".env"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  test-backend:
    build:
      context: ./backend
      target: tester
    volumes:
      - ./backend:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
      - ./backend/coverage:/app/coverage
    profiles:
      - test
    command: sh -c 'cargo llvm-cov --html --output-dir /app/coverage'

  frontend:
    build:
      context: ./tjsf
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: rtc_frontend
    ports:
      - "3000:3000"
    env_file: ".env"

    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  cargo-cache:
  target-cache:
